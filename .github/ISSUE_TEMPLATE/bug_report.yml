name: Bug report
description: Report something that does not work as documented.
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-paragraph description of the bug.
      placeholder: |
        When I run `cargo build -p savitri-lightnode --features rpc`, …
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Smallest set of steps that reproduces the issue.
      placeholder: |
        1. Clone the repo at commit `<sha>`.
        2. Run `cargo build --release -p savitri-masternode`.
        3. Observe …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include relevant logs.
      render: shell

  - type: input
    id: rust-version
    attributes:
      label: Rust toolchain
      description: Output of `rustc --version`
      placeholder: rustc 1.82.0 (...)
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Ubuntu 24.04 / macOS 14 / Windows 11
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Anything else useful — config snippets, peer count, screenshots, etc.
