name: Feature request
description: Propose a new capability or improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Which problem does this solve? Who benefits?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should be built / changed? Sketch the API or behavior.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other designs you ruled out and why.

  - type: textarea
    id: scope
    attributes:
      label: Scope / out-of-scope
      description: List what is explicitly NOT part of this proposal.

  - type: dropdown
    id: phase
    attributes:
      label: Roadmap phase (your guess)
      options:
        - "Phase 1 — Foundations & DX"
        - "Phase 2 — Performance & Reliability"
        - "Phase 3 — Research & Scaling"
        - "Not sure"
      default: 3
