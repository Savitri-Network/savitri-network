[toolchain]
# Several transitive dependencies (`time 0.3.47`, `icu_*`, etc.) now
# require rustc 1.88+, and `getrandom 0.4` / `ahash 0.8.12+` need
# edition 2024 (Rust 1.85+). 1.90 is the latest stable at the time of
# writing and satisfies every constraint in the resolved tree. Older
# edition-2021 crates in the workspace continue to build unchanged;
# the bump is additive only.
channel = "1.90.0"
components = ["rustfmt", "clippy"]
profile = "minimal"
